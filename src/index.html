<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ExercicioBase</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
    <script>
      let pollingInterval = null;

      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "START_TEST_POLLING") {
          if (pollingInterval) clearInterval(pollingInterval);

          let lastStatus = "PENDING";

          pollingInterval = setInterval(async () => {
            try {
              const response = await fetch(
                "/assets/test-result.json?t=" + Date.now(),
              );
              if (!response.ok) return;

              const data = await response.json();

              if (data && data.status !== lastStatus) {
                if (data.status === "PASS" || data.status === "FAIL") {
                  lastStatus = data.status;

                  window.parent.postMessage(
                    { type: "TEST_RESULT", status: data.status },
                    "*",
                  );

                  clearInterval(pollingInterval);
                  pollingInterval = null;
                }
              }
            } catch (error) {}
          }, 1000);
        }
      });
    </script>
  </body>
</html>
